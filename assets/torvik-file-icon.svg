<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ochre" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D24A38"/>
      <stop offset="1" stop-color="#9E2C20"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFAF7"/>
      <stop offset="1" stop-color="#ECE9E1"/>
    </linearGradient>
  </defs>

  <!-- soft drop shadow -->
  <path d="M 130 70 L 356 70 L 408 122 L 408 452 Q 408 466 394 466 L 130 466
           Q 116 466 116 452 L 116 84 Q 116 70 130 70 Z"
        fill="#000000" opacity="0.10" transform="translate(6 7)"/>

  <!-- page body with folded top-right corner -->
  <path d="M 130 64 L 356 64 L 408 116 L 408 446 Q 408 460 394 460 L 130 460
           Q 116 460 116 446 L 116 78 Q 116 64 130 64 Z"
        fill="url(#page)" stroke="#CBC7BD" stroke-width="4"/>

  <!-- the folded corner -->
  <path d="M 356 64 L 408 116 L 360 116 Q 356 116 356 112 Z"
        fill="#D8D4C9" stroke="#CBC7BD" stroke-width="3" stroke-linejoin="round"/>

  <!-- carved red T glyph (same mark as the app icon), placed on the page -->
  <g transform="translate(256 196) scale(0.86) translate(-256 -271)">
    <path d="M 176 158
             L 336 158
             L 336 196
             L 322 208
             L 280 208
             L 286 360
             L 300 384
             L 212 384
             L 226 360
             L 232 208
             L 190 208
             L 176 196
             Z"
          fill="url(#ochre)" stroke="#7E2418" stroke-width="5" stroke-linejoin="round"/>
    <path d="M 180 162 L 332 162" stroke="#E86A57" stroke-width="4"
          stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- .tv label -->
  <text x="262" y="424" text-anchor="middle"
        font-family="DejaVu Sans, Verdana, sans-serif" font-size="78" font-weight="700"
        fill="#3A4654">.tv</text>
</svg>
