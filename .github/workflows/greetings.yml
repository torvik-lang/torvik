name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "Hello! Thank you for opening your first issue in Torvik! 🎉 We appreciate your contribution. Our team will review it as soon as possible. In the meantime, please make sure you've checked the [CONTRIBUTING.md](CONTRIBUTING.md) guidelines."
        pr-message: "Thank you for your first pull request in Torvik! 🚀 We really appreciate you taking the time to contribute. Someone from the team will review your changes shortly. In the meantime, feel free to check out the [CONTRIBUTING.md](CONTRIBUTING.md) for our guidelines."
